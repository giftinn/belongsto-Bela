<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Inter',sans-serif;
background:#F4F0FF;
height:100vh;
overflow:hidden;
}

#app{
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.card{
position:absolute;
width:90%;
max-width:420px;
max-height:90vh;
overflow:auto;
background:#ffffff;
border-radius:26px;
padding:40px 32px;
text-align:center;
box-shadow:0 30px 70px rgba(120,90,180,.25);
opacity:0;
transform:scale(.94) translateY(40px);
transition:.7s cubic-bezier(.19,1,.22,1);
pointer-events:none;
}

.card::-webkit-scrollbar{width:6px}
.card::-webkit-scrollbar-thumb{background:#A084E8;border-radius:10px}

.card.active{
opacity:1;
transform:scale(1) translateY(0);
pointer-events:auto;
}

h1,h2{
font-family:'DM Serif Display',serif;
margin:0 0 14px;
color:#7F6CD9;
}

p{
font-size:18px;
line-height:1.7;
opacity:.85;
color:#000000;
}

button{
padding:12px 26px;
border:none;
border-radius:999px;
background:#A084E8;
cursor:pointer;
margin-top:18px;
font-size:15px;
transition:.25s;
color:#ffffff;
}

button:hover{
transform:scale(1.05);
background:#7F6CD9;
box-shadow:0 10px 25px rgba(120,90,180,.5);
}

/* PIN */
.pin-display{
display:flex;
justify-content:center;
gap:12px;
margin:25px 0;
}

.dot{
width:18px;
height:18px;
border-radius:50%;
border:2px solid #A084E8;
}

.dot.fill{background:#A084E8}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.keypad button{
padding:16px;
font-size:18px;
border-radius:14px;
}

/* GAME */
#options{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

#options button{
background:#F4F0FF;
border:1px solid #A084E8;
color:#5E548E;
}

.score-box{
margin-top:22px;
font-size:15px;
letter-spacing:.5px;
color:#7F6CD9;
}

#feedback{
margin-top:14px;
min-height:22px;
font-size:14px;
transition:.3s;
color:#7F6CD9;
}

/* CORRECT */
.correctAnim{
animation:pop .4s ease;
background:#D1FADF !important;
border-color:#34C759 !important;
color:#1B5E20 !important;
}

/* WRONG */
.wrongAnim{
animation:shake .4s;
background:#FFE0E3 !important;
border-color:#FF4D6D !important;
color:#7A1C2E !important;
}

@keyframes pop{
0%{transform:scale(.9)}
60%{transform:scale(1.08)}
100%{transform:scale(1)}
}

@keyframes shake{
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-4px)}
}

/* TIMER */
.lovebox{
background:linear-gradient(145deg,#ffffff,#F4F0FF);
border-radius:22px;
padding:20px;
margin-bottom:25px;
box-shadow:0 12px 35px rgba(120,90,180,.25);
border:1px solid rgba(120,90,180,.2);
}

.timer-title{
font-size:12px;
letter-spacing:2px;
opacity:.6;
color:#7F6CD9;
}

.timer-display{
font-family:'DM Serif Display',serif;
font-size:28px;
margin-top:8px;
color:#5E548E;
letter-spacing:1px;
animation:pulse 2.5s infinite;
}

@keyframes pulse{50%{opacity:.5}}

/* MEDIA */
.reveal-box{
margin:20px 0;
aspect-ratio:16/9;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
border:2px dashed #A084E8;
cursor:pointer;
background:#F4F0FF;
transition:.3s;
}

.reveal-box:hover{transform:scale(1.02)}

/* LETTER FINAL */
.letter{
margin-top:22px;
font-family:'Cormorant Garamond',serif;
font-size:18px;
line-height:1.3;
letter-spacing:.4px;
text-align:left;
color:#000000;
opacity:.95;
min-height:100px;
animation:fadeInText 1.2s ease;
white-space: pre-line;
}

.signature{
margin-top:32px;
text-align:right;
font-family:'Playfair Display',serif;
font-size:20px;
letter-spacing:1px;
color:#7F6CD9;
animation:fadeInText 1.8s ease;
}

@keyframes fadeInText{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* HEART BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confettiCanvas"></canvas>

<audio id="bgm" src="song.mp3" loop></audio>
  
<div id="app">

<!-- welcome -->
<section class="card active">
<h1>‎Hallo, Bela! </h1>
<p>I have something for you<br>but you have to unlock it first, ok?</p>
<button onclick="next()">Unlock</button>
</section>

<!-- pin -->
<section class="card">
<h2>Enter the code 🔐</h2>
<div class="pin-display" id="pin"></div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPin()">⌫</button>
<button onclick="press(0)">0</button>
<button onclick="checkPin()">✔</button>
</div>
</section>

<!-- quiz -->
<section class="card">
<h2 id="question">Little game 🎮</h2>
<p>Answer correctly to earn points</p>
<div id="options"></div>

<div class="score-box">
Points: <span id="score">0</span> / 3
</div>

<p id="feedback"></p>
</section>

<!-- final -->
<section class="card">

<h1>Bela's Birthday</h1>

<div class="lovebox">
<div class="timer-title">TIME WITH YOU</div>
<div id="loveTimer" class="timer-display">loading...</div>
</div>

<div class="reveal-box" onclick="revealMemory(this)">
Tap to reveal our memory
</div>

<div id="letter" class="letter"></div>
<div id="sign" class="signature"></div>

</section>

</div>

<script>

/* =================================================
   SLIDE NAVIGATION
================================================= */

const cards=document.querySelectorAll('.card');
let page=0;
const music=document.getElementById("bgm");
music.volume=0.4;
let musicStarted=false;

function show(){
cards.forEach(c=>c.classList.remove('active'));
cards[page].classList.add('active');
if(page===3)startTimer();
}

function next(){
page++;

if(page===1 && !musicStarted){
music.play();
musicStarted=true;
}

show();
if(page===2)loadQuestion();
}



/* =================================================
   PIN SYSTEM
================================================= */

let pinInput = '';
const correctPin = '1212';
const pinDisplay = document.getElementById("pin");

function renderDots(){
    pinDisplay.innerHTML = '';

    for(let i=0;i<4;i++){
        const d = document.createElement("div");
        d.className = "dot" + (i < pinInput.length ? " fill" : "");
        pinDisplay.appendChild(d);
    }
}

renderDots();

function press(n){
    if(pinInput.length < 4){
        pinInput += n;
        renderDots();
    }
}

function clearPin(){
    pinInput = pinInput.slice(0,-1);
    renderDots();
}

function checkPin(){
    if(pinInput === correctPin){
        next();
    }else{
        pinDisplay.classList.add('shake');

        setTimeout(()=>{
            pinDisplay.classList.remove('shake');
        },400);

        pinInput = '';
        renderDots();
    }
}


/* =================================================
   QUIZ SYSTEM
================================================= */

const questions=[
{q:"What month is your birthday?", options:["January","February","March"],correct:2},
{q:"What's your favorite color?", options:["Pink","Orange","Purple"],correct:2},
{q:"What animal are you afraid of?", options:["Cat","Cockroach","Bird"],correct:0},
];

let currentQ = 0;
let score = 0;

const scoreEl = document.getElementById("score");
const question = document.getElementById("question");
const options = document.getElementById("options");
const feedback = document.getElementById("feedback");


function loadQuestion(){

    const q = questions[currentQ];

    question.textContent = q.q;
    options.innerHTML = "";
    feedback.textContent = "";

    q.options.forEach((opt,i)=>{
        const b = document.createElement("button");
        b.textContent = opt;
        b.onclick = () => checkAnswer(i,b);
        options.appendChild(b);
    });
}


function checkAnswer(i,btn){

    const q = questions[currentQ];

    if(i === q.correct){

        score++;
        scoreEl.textContent = score;

        btn.classList.add("correctAnim");
        feedback.textContent = "Correct🤍";

        setTimeout(()=>{
            currentQ++;

            if(currentQ < questions.length){
                loadQuestion();
            }else{
                next();
            }
        },900);

    }else{

        btn.classList.add("wrongAnim");
        feedback.textContent = "Oh no, Try again!";
    }
}


/* =================================================
   RELATIONSHIP TIMER
================================================= */

function startTimer(){

    const start = new Date("2004-03-18T00:00:00");

    setInterval(()=>{

        const diff = new Date() - start;

        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff / 3600000) % 24;
        const m = Math.floor(diff / 60000) % 60;
        const s = Math.floor(diff / 1000) % 60;

        loveTimer.textContent = `${d} days ${h}h ${m}m ${s}s`;

    },1000);
}


/* =================================================
   MEMORY REVEAL + TYPING LETTER
================================================= */

let alreadyRevealed = false;

function revealMemory(el){

    if(alreadyRevealed) return;
    alreadyRevealed = true;

    el.innerHTML = `
        <img src="pict.jpg"
        style="width:100%;height:100%;object-fit:cover;border-radius:18px">
    `;

    const text = `
    Yeay! Here we are. Selamat ulang tahun yang ke 22 ya bela. Semoga panjang umur, sehat selalu, sukses terus, berkah umurnya, dan semua keinginannya cepat terwujud. Aamiin.

Bel, no matter how much life changes, no matter how distant everything feels one day, I will always walking beside you quietly until we grow old.

And in all the smallest, almost silly ways, I’ll still take care of you too… like protecting you from those stray cats that try to brush against you or lick your feet WKWKWKWK.

Makasih banyak ya bel… for staying, for understanding me in ways I can’t always explain, for being someone I never have to pretend with. If one day everything feels too quiet or too far away, I hope you’ll remember that somewhere in this world, there’s still me, still caring for you, still here… until the very end of all our days. 

May Allah always protect you, keep your heart soft, full of iman, and surround your life with barakah and peace. I will keep your name in my du’a to ease your burdens. Semoga kita gak cuma temanan di dunia, tapi juga di akhirat, in Jannah ya bel. Aamiin  `;

    const paragraphs = text.split("\n\n");

    const letter = document.getElementById("letter");
    const sign = document.getElementById("sign");

    if(!letter || !sign) return console.error("Letter or Sign element missing");

    let p=0;
    let i=0;

    function typeParagraph(){

        if(p>=paragraphs.length){
            sign.innerHTML="Sincerely<br> Me";
            return;
        }

        const para=document.createElement("p");
        letter.appendChild(para);

        const typing=setInterval(()=>{
            para.innerHTML+=paragraphs[p].charAt(i);
            i++;

            if(i>=paragraphs[p].length){
                clearInterval(typing);
                p++;
                i=0;
                setTimeout(typeParagraph,350);
            }

        },30);
    }

    typeParagraph();
}


/* =================================================
   FLOATING HEARTS BACKGROUND
================================================= */

const canvas=document.getElementById("confettiCanvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

const colors=[
"rgba(160,132,232,0.35)", // soft purple
"rgba(127,108,217,0.35)", // medium purple
"rgba(94,84,142,0.35)"    // deeper purple
];

let hearts=[];
for(let i=0;i<140;i++){
hearts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*6+2,
v:Math.random()*0.6+0.2,
c:colors[Math.floor(Math.random()*colors.length)]
});
}

function heart(x,y,s){
ctx.beginPath();
ctx.moveTo(x,y);
ctx.bezierCurveTo(x,y-s,x-s,y-s,x-s,y);
ctx.bezierCurveTo(x-s,y+s,x,y+s*1.4,x,y+s*1.8);
ctx.bezierCurveTo(x,y+s*1.4,x+s,y+s,x+s,y);
ctx.bezierCurveTo(x+s,y-s,x,y-s,x,y);
ctx.fill();
}

function anim(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.shadowColor="rgba(127,108,217,0.6)";
ctx.shadowBlur=12;

hearts.forEach(h=>{
ctx.fillStyle=h.c;
heart(h.x,h.y,h.s);
h.y+=h.v;
if(h.y>canvas.height){
h.y=-90;
h.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
